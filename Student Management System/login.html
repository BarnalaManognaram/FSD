<!DOCTYPE html>
<html>
    <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <link rel="stylesheet" href="./style/Home.css">
    <link rel="stylesheet" href="./style/login.css">
    </head>
    <body>
         <header>
           <img src="./icons/vignan.png" alt="Vignan Logo" width="120px" height="60px">
        </header>
        <nav aria-label="Primary Navigator" class="navbar">
           <a id="homeLink" href="./Home.html">Home</a>
          <a href="./ExamSection.html" id="ExamLink">Exam Section</a>
          <a href="./Profile.html" id="profileLink">Profile</a>
          <a href="./login.html" id="loginLink">Login</a>
        </nav>
        <main>
            <section class="login" >               
                <form method="post" class="loginForm" onsubmit="login(event)">
                        <h2>Login</h2>
                    <input id="RegNo" type="text" name="RegNo" placeholder="RegNo" required><br><br>
                    <input id="password" type="password" name="password" placeholder="Password" required><br><br>
                    <input id="submitBtn" type="submit" value="Login">
                </form>
            </section>
        </main>
        <script src="./javascript/login.js"></script>
        <script src="./javascript/home.js"></script>   
    </body>
</html>
